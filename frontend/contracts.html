<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DormManager - Hợp đồng</title>
    <!-- Tailwind local build -->
    <link rel="stylesheet" href="assets/css/tailwind.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <script src="assets/js/config.js"></script>
    
    
    
  </head>
  <body class="bg-background text-main font-sans antialiased">
    <div class="app-container">
      <!-- Sidebar injected here -->
      <div id="sidebar-container" style="display: contents"></div>

      <div class="main-content">
        <!-- Header injected here -->
        <div id="header-container" style="display: contents"></div>

        <!-- Page Content -->
        <main class="p-6 md:p-8 animate-fade-in">
          <div class="flex items-center justify-between mb-8 animate-slide-up">
            <div>
              <h2
                class="text-2xl font-lexend font-bold tracking-tight text-main"
              >
                Hợp đồng thuê phòng
              </h2>
              <p class="text-sm text-muted mt-1">
                Quản lý thời hạn và trạng thái hợp đồng.
              </p>
            </div>
            <button
              id="add-contract-btn"
              class="bg-primary hover:bg-[#1046b6] text-white px-4 py-2 rounded-xl font-bold flex items-center gap-2 transition-all shadow-primary"
            >
              <span class="material-symbols-outlined text-[1.25rem]">add</span>
              Tạo hợp đồng
            </button>
          </div>

          <!-- Stats -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 animate-slide-up delay-100" id="contract-stats-bar"></div>

          <!-- Filter Bar -->
          <div class="bg-white rounded-t-2xl border-x border-t border-slate-100 p-4 animate-slide-up delay-200">
            <div class="flex flex-wrap items-center gap-3">
              <div class="relative flex-1 min-w-[180px] max-w-sm">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input type="text" id="search-contract-input" placeholder="Tìm mã HĐ, tên SV, phòng..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-[13px] focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all font-medium text-slate-700 placeholder-slate-400" />
              </div>
              <div class="relative">
                <select id="filter-contract-status" class="pl-3 pr-8 py-2 bg-slate-50 border border-slate-200 rounded-xl text-[13px] font-medium text-slate-700 focus:outline-none focus:ring-2 focus:ring-primary/20 appearance-none cursor-pointer">
                  <option value="">Tất cả trạng thái</option>
                  <option value="Hiệu lực">Hiệu lực</option>
                  <option value="Sắp hết hạn">Sắp hết hạn</option>
                  <option value="Hết hạn">Hết hạn</option>
                </select>
                <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none text-[1rem]">expand_more</span>
              </div>
              <div class="ml-auto text-[12px] font-semibold text-slate-400" id="contract-count-label"></div>
            </div>
          </div>

          <!-- Table -->
          <div class="bg-white shadow-sm border border-slate-100 overflow-hidden animate-slide-up delay-200">
            <div class="overflow-x-auto">
              <table class="w-full text-left border-collapse min-w-[700px]">
                <thead>
                  <tr>
                    <th class="bg-slate-50 text-slate-500 font-bold uppercase text-xs px-6 py-4 border-b border-slate-200 sortable-th cursor-pointer select-none" data-sort="id">Mã HĐ <span class="sort-icon ml-1 text-[0.7rem] opacity-40">↕</span></th>
                    <th class="bg-slate-50 text-slate-500 font-bold uppercase text-xs px-6 py-4 border-b border-slate-200 sortable-th cursor-pointer select-none" data-sort="studentName">Sinh viên <span class="sort-icon ml-1 text-[0.7rem] opacity-40">↕</span></th>
                    <th class="bg-slate-50 text-slate-500 font-bold uppercase text-xs px-6 py-4 border-b border-slate-200">Phòng</th>
                    <th class="bg-slate-50 text-slate-500 font-bold uppercase text-xs px-6 py-4 border-b border-slate-200 sortable-th cursor-pointer select-none" data-sort="startDate">Ngày BĐ <span class="sort-icon ml-1 text-[0.7rem] opacity-40">↕</span></th>
                    <th class="bg-slate-50 text-slate-500 font-bold uppercase text-xs px-6 py-4 border-b border-slate-200 sortable-th cursor-pointer select-none" data-sort="endDate">Ngày KT <span class="sort-icon ml-1 text-[0.7rem] opacity-40">↕</span></th>
                    <th class="bg-slate-50 text-slate-500 font-bold uppercase text-xs px-6 py-4 border-b border-slate-200">Trạng thái</th>
                    <th class="bg-slate-50 text-slate-500 font-bold uppercase text-xs px-6 py-4 border-b border-slate-200 text-right">Thao tác</th>
                  </tr>
                </thead>
                <tbody id="contracts-table-body"></tbody>
              </table>
            </div>
          </div>

          <!-- Pagination -->
          <div class="bg-white rounded-b-2xl border-x border-b border-slate-100 px-4 py-3 flex items-center justify-between animate-slide-up delay-300">
            <div class="flex items-center gap-2 text-[12px] text-slate-500">
              <span>Hiển thị</span>
              <select id="ct-page-size" class="px-2 py-1 bg-slate-50 border border-slate-200 rounded-lg text-[12px] font-medium focus:outline-none cursor-pointer">
                <option value="10">10</option>
                <option value="15" selected>15</option>
                <option value="25">25</option>
              </select>
              <span>dòng / trang</span>
            </div>
            <div class="flex items-center gap-1" id="ct-pagination-controls"></div>
          </div>
        </main>
      </div>
    </div>

    <!-- Core Scripts -->
    <script type="module" src="assets/js/main.js"></script>
    <script type="module" src="assets/js/pages/contracts.js"></script>
  </body>
</html>
